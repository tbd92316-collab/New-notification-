name: Ultimate Single File Android Builder

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Isse tum GitHub UI se jab chaho manually run kar sakte ho

jobs:
  create-and-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Generate Android Project Structure on the Fly
      run: |
        echo "Creating directories..."
        mkdir -p app/src/main/java/com/example/notificationapp
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/values

        # 1. settings.gradle banana
        cat << 'EOF' > settings.gradle
        pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories { google(); mavenCentral() }
        }
        rootProject.name = "NotificationApp"
        include ':app'
        EOF

        # 2. Root build.gradle banana
        cat << 'EOF' > build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
        }
        allprojects { repositories { google(); mavenCentral() } }
        task clean(type: Delete) { delete rootProject.buildDir }
        EOF

        # 3. app/build.gradle banana
        cat << 'EOF' > app/build.gradle
        plugins { id 'com.android.application' }
        android {
            namespace 'com.example.notificationapp'
            compileSdk 34
            defaultConfig {
                applicationId "com.example.notificationapp"
                minSdk 26
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
        }
        EOF

        # 4. AndroidManifest.xml banana
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
            <application
                android:allowBackup="true"
                android:label="OneClick Notification App"
                android:supportsRtl="true"
                android:theme="@style/Theme.AppCompat.Light.DarkActionBar">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        # 5. activity_main.xml Layout banana
        cat << 'EOF' > app/src/main/res/layout/activity_main.xml
        <?xml version="1.0" encoding="utf-8"?>
        <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:gravity="center">
            <Button
                android:id="@+id/btnNotification"
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:text="Spam Test Notification"
                android:padding="16dp" />
        </RelativeLayout>
        EOF

        # 6. MainActivity.java Code banana
        cat << 'EOF' > app/src/main/java/com/example/notificationapp/MainActivity.java
        package com.example.notificationapp;

        import android.app.NotificationChannel;
        import android.app.NotificationManager;
        import android.content.Context;
        import android.content.pm.PackageManager;
        import android.os.Build;
        import android.os.Bundle;
        import android.view.View;
        import android.widget.Button;
        import androidx.appcompat.app.AppCompatActivity;
        import androidx.core.app.ActivityCompat;
        import androidx.core.app.NotificationCompat;
        import androidx.core.content.ContextCompat;

        public class MainActivity extends AppCompatActivity {
            private static final String CHANNEL_ID = "one_click_channel";
            private static final int NOTIFICATION_ID = 999;

            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                setContentView(R.layout.activity_main);
                createNotificationChannel();

                Button btnNotification = findViewById(R.id.btnNotification);
                btnNotification.setOnClickListener(new View.OnClickListener() {
                    @Override
                    public void onClick(View v) {
                        if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                            if (ContextCompat.checkSelfPermission(MainActivity.this, android.Manifest.permission.POST_NOTIFICATIONS) 
                                    != PackageManager.PERMISSION_GRANTED) {
                                ActivityCompat.requestPermissions(MainActivity.this, new String[]{android.Manifest.permission.POST_NOTIFICATIONS}, 101);
                                return;
                            }
                        }
                        sendNotification();
                    }
                });
            }

            private void sendNotification() {
                NotificationCompat.Builder builder = new NotificationCompat.Builder(this, CHANNEL_ID)
                        .setSmallIcon(android.R.drawable.stat_notify_chat)
                        .setContentTitle("Single YAML Success!")
                        .setContentText("GitHub Actions ne bina kisi local file ke ye APK banaya hai.")
                        .setPriority(NotificationCompat.PRIORITY_DEFAULT)
                        .setAutoCancel(true);

                NotificationManager manager = (NotificationManager) getSystemService(Context.NOTIFICATION_SERVICE);
                if (manager != null) {
                    manager.notify(NOTIFICATION_ID, builder.build());
                }
            }

            private void createNotificationChannel() {
                if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                    NotificationChannel channel = new NotificationChannel(CHANNEL_ID, "Test Channel", NotificationManager.IMPORTANCE_DEFAULT);
                    NotificationManager notificationManager = getSystemService(NotificationManager.class);
                    if (notificationManager != null) {
                        notificationManager.createNotificationChannel(channel);
                    }
                }
            }
        }
        EOF
        echo "All files generated dynamically!"

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Initialize Gradle Wrapper & Permissions
      run: |
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew

    - name: Build Android Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Final APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OneClick-NotificationApp
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 5
        
