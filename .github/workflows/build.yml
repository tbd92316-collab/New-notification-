name: Build APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create Android App
        run: |
          # Folder structure
          mkdir -p app/src/main/java/com/test/app
          mkdir -p app/src/main/res/layout
          
          # MainActivity.java
          cat > app/src/main/java/com/test/app/MainActivity.java << 'EOF'
          package com.test.app;
          import android.app.*;
          import android.os.*;
          import android.widget.*;
          import androidx.appcompat.app.*;
          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  findViewById(R.id.btn).setOnClickListener(v -> {
                      NotificationManager nm = (NotificationManager) getSystemService(NOTIFICATION_SERVICE);
                      if (android.os.Build.VERSION.SDK_INT >= 26) {
                          nm.createNotificationChannel(new NotificationChannel("ch", "Test", NotificationManager.IMPORTANCE_HIGH));
                      }
                      NotificationCompat.Builder b = new NotificationCompat.Builder(this, "ch");
                      b.setSmallIcon(android.R.drawable.ic_dialog_info);
                      b.setContentTitle("Test");
                      b.setContentText("Working!");
                      nm.notify(1, b.build());
                  });
              }
          }
          EOF
          
          # activity_main.xml
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:gravity="center">
              <Button android:id="@+id/btn"
                  android:text="Show Notification"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"/>
          </LinearLayout>
          EOF
          
          # AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.test.app">
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
              <application android:label="Test App">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          # app/build.gradle (compileSdk 33 - jo kaam karta hai)
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.test.app'
              compileSdk 33
              defaultConfig {
                  applicationId 'com.test.app'
                  minSdk 21
                  targetSdk 33
                  versionCode 1
                  versionName '1.0'
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.core:core:1.9.0'
          }
          EOF
          
          # Project build.gradle
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
          }
          EOF
          
          # settings.gradle
          echo "include ':app'" > settings.gradle
          
          # gradle-wrapper.properties
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-7.5-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Make gradlew
        run: |
          curl -L -o gradlew https://raw.githubusercontent.com/gradle/gradle/v7.5.0/gradlew
          chmod +x gradlew
          
      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MyApp
          path: app/build/outputs/apk/debug/*.apk
