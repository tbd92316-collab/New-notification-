name: Build APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create complete Android app
        run: |
          # Create folder structure
          mkdir -p app/src/main/java/com/test/app
          mkdir -p app/src/main/res/layout
          mkdir -p gradle/wrapper
          
          # Create MainActivity.java
          cat > app/src/main/java/com/test/app/MainActivity.java << 'EOF'
          package com.test.app;
          import android.app.*;
          import android.os.*;
          import android.widget.*;
          import androidx.appcompat.app.*;
          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  Button btn = findViewById(R.id.btn);
                  btn.setOnClickListener(v -> {
                      NotificationManager nm = (NotificationManager) getSystemService(NOTIFICATION_SERVICE);
                      if (android.os.Build.VERSION.SDK_INT >= 26) {
                          nm.createNotificationChannel(new NotificationChannel("ch", "Test", NotificationManager.IMPORTANCE_HIGH));
                      }
                      NotificationCompat.Builder b = new NotificationCompat.Builder(this, "ch");
                      b.setSmallIcon(android.R.drawable.ic_dialog_info);
                      b.setContentTitle("Test Notification");
                      b.setContentText("Button Pressed Successfully!");
                      b.setPriority(NotificationCompat.PRIORITY_HIGH);
                      nm.notify(1, b.build());
                  });
              }
          }
          EOF
          
          # Create layout XML
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:gravity="center"
              android:orientation="vertical">
              <Button
                  android:id="@+id/btn"
                  android:text="Show Notification"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:padding="16dp"
                  android:textSize="18sp"/>
          </LinearLayout>
          EOF
          
          # Create AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.test.app">
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
              <application
                  android:allowBackup="true"
                  android:label="Test App"
                  android:theme="@style/Theme.AppCompat.Light">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          # Create app build.gradle
          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.test.app'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.test.app'
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.core:core:1.12.0'
          }
          EOF
          
          # Create project build.gradle
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.0'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          task clean(type: Delete) {
              delete rootProject.buildDir
          }
          EOF
          
          # Create settings.gradle
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "TestApp"
          include ':app'
          EOF
          
          # Create gradle wrapper properties
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Setup Gradle
        run: |
          # Create gradlew script
          cat > gradlew << 'EOF'
          #!/bin/sh
          GRADLE_VERSION=8.0
          GRADLE_URL="https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip"
          GRADLE_ZIP="gradle-${GRADLE_VERSION}-bin.zip"
          GRADLE_DIR="gradle-${GRADLE_VERSION}"
          
          if [ ! -d "$GRADLE_DIR" ]; then
              echo "Downloading Gradle..."
              curl -s -L -o "$GRADLE_ZIP" "$GRADLE_URL"
              unzip -q "$GRADLE_ZIP"
              rm "$GRADLE_ZIP"
          fi
          
          "$GRADLE_DIR/bin/gradle" "$@"
          EOF
          
          chmod +x gradlew
          
      - name: Build APK
        run: |
          ./gradlew clean assembleDebug --no-daemon --stacktrace
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Notification-App
          path: app/build/outputs/apk/debug/*.apk
